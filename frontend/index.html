<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Renewable Proposal Extractor</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main id="app">
    <h1>Renewable Proposal Extractor</h1>
    <p>Upload a project proposal PDF to extract structured technical and financial data.</p>

    <form id="upload-form">
      <input type="file" id="file-input" data-testid="file-input" accept="application/pdf" />
      <button type="submit" id="submit-button" data-testid="submit-button">Analyze</button>
    </form>

    <p id="validation-error" data-testid="validation-error" hidden></p>

    <p id="loading" data-testid="loading" hidden>Analyzing document...</p>

    <section id="results" data-testid="results" hidden></section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
